name: Build Unsigned IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  XCODE_MAJOR: "26"
  IOS_DEPLOYMENT_TARGET: "26.0"
  LLAMA_CPP_TAG: "b8548"
  CONFIGURATION: ${{ github.event.inputs.build_type == 'debug' && 'Debug' || 'Release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  build:
    runs-on: macos-26
    strategy:
      matrix:
        runtime_flavor: [with-runtimes, no-runtimes]
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'

    - name: Verify iPhoneOS SDK
      run: |
        set -eo pipefail
        sudo xcode-select -s "$DEVELOPER_DIR"
        xcodebuild -showsdks

    - name: Restore llama.cpp Cache
      id: cache-llama
      uses: actions/cache@v4
      with:
        path: |
          .deps/llama.cpp
          Vendor/llama.xcframework
        key: ${{ runner.os }}-llama-xcframework-${{ env.LLAMA_CPP_TAG }}
        restore-keys: |
          ${{ runner.os }}-llama-xcframework-

    - name: Build llama.cpp XCFramework
      if: steps.cache-llama.outputs.cache-hit != 'true'
      run: |
        set -eo pipefail
        mkdir -p .deps Vendor
        git clone --depth 1 --branch "${LLAMA_CPP_TAG}" https://github.com/ggml-org/llama.cpp.git .deps/llama.cpp
        bash Scripts/build-llama-ios-xcframework.sh "$PWD/.deps/llama.cpp" "$PWD/Vendor/llama.xcframework"

    - name: Set Up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Restore Embedded Runtimes Cache
      if: matrix.runtime_flavor == 'with-runtimes'
      id: cache-runtimes
      uses: actions/cache@v4
      with:
        path: Vendor/Runtime
        key: ${{ runner.os }}-embedded-runtimes-${{ hashFiles('Scripts/embedded-runtime-sources.json') }}
        restore-keys: |
          ${{ runner.os }}-embedded-runtimes-

    - name: Build Embedded Runtimes
      if: matrix.runtime_flavor == 'with-runtimes' && steps.cache-runtimes.outputs.cache-hit != 'true'
      run: |
        set -eo pipefail
        mkdir -p Vendor/Runtime
        bash Scripts/build-embedded-runtimes.sh \
          "$PWD/Scripts/embedded-runtime-sources.json" \
          "$PWD/Vendor/Runtime"

    - name: Mock Empty Runtimes
      if: matrix.runtime_flavor == 'no-runtimes'
      run: |
        mkdir -p Vendor/Runtime
        echo "{}" > Vendor/Runtime/EmbeddedRuntimeManifest.json
        mkdir -p Vendor/Runtime/OllamaKitPythonRuntime.xcframework
        mkdir -p Vendor/Runtime/OllamaKitNodeRuntime.xcframework
        mkdir -p Vendor/Runtime/OllamaKitSwiftRuntime.xcframework

    - name: Generate Agent Workspace Seed
      run: |
        set -eo pipefail
        python3 Scripts/generate-agent-workspace-seed.py
        echo "✅ Agent workspace seed regenerated"

    - name: Run Package Tests
      run: |
        set -eo pipefail
        if [ "${{ matrix.runtime_flavor }}" == "with-runtimes" ]; then
          bash Scripts/ensure-embedded-runtimes.sh "$PWD/Vendor/Runtime"
        fi
        SKIP_OLLAMAKIT_PACKAGE_TARGET=1 swift test

    - name: Build Variant Archives
      run: |
        set -eo pipefail
        rm -rf build
        mkdir -p build/logs build/ipas
        build_variant() {
          local variant="$1"
          local swift_flag="$2"
          local flavor_tag="${{ matrix.runtime_flavor }}"
          local archive_dir="build/${variant}"
          local archive_path="${archive_dir}/OllamaKit.xcarchive"
          local build_log="build/logs/${variant}-${flavor_tag}.log"
          local ipa_path="build/ipas/OllamaKit-${variant}-${flavor_tag}-unsigned.ipa"
          rm -rf "$archive_dir" build/Payload
          mkdir -p "$archive_dir" build/Payload
          local extra_flags="${swift_flag}"
          if [ "$flavor_tag" == "no-runtimes" ]; then
            extra_flags="${extra_flags} -D OLLAMAKIT_DISABLE_EMBEDDED_RUNTIMES"
          fi
          xcodebuild archive \
            -project OllamaKit.xcodeproj \
            -scheme OllamaKit \
            -configuration ${{ env.CONFIGURATION }} \
            -sdk iphoneos \
            -archivePath "$archive_path" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            ARCHS="arm64" \
            OTHER_SWIFT_FLAGS="\$(inherited) ${extra_flags}" \
            2>&1 | tee "$build_log"
          APP_PATH=$(find "$archive_path" -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qr "$(basename "$ipa_path")" Payload)
          mv "build/$(basename "$ipa_path")" "$ipa_path"
        }
        build_variant "stockSideload" "-D OLLAMAKIT_VARIANT_STOCK_SIDELOAD"
        build_variant "jailbreak" "-D OLLAMAKIT_VARIANT_JAILBREAK"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IPAs-${{ matrix.runtime_flavor }}-${{ env.CONFIGURATION }}
        path: build/ipas

    - name: Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/ipas/*.ipa
        tag_name: v${{ github.run_number }}
        name: OllamaKit ${{ github.run_number }}
        body: |
          ### IPAs for commit ${{ github.sha }}
          - Runtimes Variant: ${{ matrix.runtime_flavor }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
