name: Build Unsigned IPA

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: Build Type
        required: true
        default: release
        type: choice
        options:
          - debug
          - release

concurrency:
  group: build-unsigned-ipa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  
  LLAMA_CPP_TAG: "b8548"
  CONFIGURATION: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug') && 'Debug' || 'Release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.runtime_flavor }})
    runs-on: macos-15
    continue-on-error: ${{ matrix.runtime_flavor == 'no-runtimes' }}
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        runtime_flavor:
          - with-runtimes
          - no-runtimes

    defaults:
      run:
        shell: bash

    steps:
      - name: Select Xcode 18+
        uses: mxcl/setup-xcode@v1
        with:
          xcode-version: "18+"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify toolchain and project
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project OllamaKit.xcodeproj
          xcodebuild -showdestinations -project OllamaKit.xcodeproj -scheme OllamaKit || true

      - name: Restore llama.cpp cache
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: |
            .deps/llama.cpp
            Vendor/llama.xcframework
          key: ${{ runner.os }}-llama-xcframework-${{ env.LLAMA_CPP_TAG }}
          restore-keys: |
            ${{ runner.os }}-llama-xcframework-

      - name: Build llama.cpp XCFramework
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .deps Vendor
          git clone --depth 1 --branch "${LLAMA_CPP_TAG}" https://github.com/ggml-org/llama.cpp.git .deps/llama.cpp
          bash Scripts/build-llama-ios-xcframework.sh \
            "$PWD/.deps/llama.cpp" \
            "$PWD/Vendor/llama.xcframework"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Restore embedded runtimes cache
        if: matrix.runtime_flavor == 'with-runtimes'
        id: cache-runtimes
        uses: actions/cache@v4
        with:
          path: Vendor/Runtime
          key: ${{ runner.os }}-embedded-runtimes-${{ hashFiles('Scripts/embedded-runtime-sources.json') }}
          restore-keys: |
            ${{ runner.os }}-embedded-runtimes-

      - name: Build embedded runtimes
        if: matrix.runtime_flavor == 'with-runtimes' && steps.cache-runtimes.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p Vendor/Runtime
          bash Scripts/build-embedded-runtimes.sh \
            "$PWD/Scripts/embedded-runtime-sources.json" \
            "$PWD/Vendor/Runtime"

      - name: Mock empty runtimes
        if: matrix.runtime_flavor == 'no-runtimes'
        run: |
          set -euo pipefail
          mkdir -p Vendor/Runtime
          printf '{}' > Vendor/Runtime/EmbeddedRuntimeManifest.json
          
          # Function to create a minimal mock XCFramework
          create_mock_xcframework() {
            local name="$1"
            local framework_dir="Vendor/Runtime/${name}.xcframework"
            mkdir -p "${framework_dir}/ios-arm64/${name}.framework"
            mkdir -p "${framework_dir}/ios-arm64-simulator/${name}.framework"
            
            # Create Info.plist for the framework using printf to avoid YAML issues
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' > "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '<plist version="1.0">' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '<dict>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleDevelopmentRegion</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <string>en</string>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleExecutable</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '    <string>%s</string>\n' "${name}" >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleIdentifier</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '    <string>com.ollamakit.%s</string>\n' "${name}" >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleInfoDictionaryVersion</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <string>6.0</string>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleName</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '    <string>%s</string>\n' "${name}" >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundlePackageType</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <string>FMWK</string>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleShortVersionString</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <string>1.0</string>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <key>CFBundleVersion</key>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '    <string>1</string>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '</dict>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            printf '%s\n' '</plist>' >> "${framework_dir}/ios-arm64/${name}.framework/Info.plist"
            
            cp "${framework_dir}/ios-arm64/${name}.framework/Info.plist" "${framework_dir}/ios-arm64-simulator/${name}.framework/Info.plist"
            
            # Create the XCFramework Info.plist
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' > "${framework_dir}/Info.plist"
            printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "${framework_dir}/Info.plist"
            printf '%s\n' '<plist version="1.0">' >> "${framework_dir}/Info.plist"
            printf '%s\n' '<dict>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    <key>AvailableLibraries</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    <array>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '        <dict>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>BinaryPath</key>' >> "${framework_dir}/Info.plist"
            printf '            <string>%s.framework/%s</string>\n' "${name}" "${name}" >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>LibraryIdentifier</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <string>ios-arm64</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>LibraryPath</key>' >> "${framework_dir}/Info.plist"
            printf '            <string>%s.framework</string>\n' "${name}" >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>SupportedArchitectures</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <array>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '                <string>arm64</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            </array>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>SupportedPlatform</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <string>ios</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '        </dict>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '        <dict>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>BinaryPath</key>' >> "${framework_dir}/Info.plist"
            printf '            <string>%s.framework/%s</string>\n' "${name}" "${name}" >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>LibraryIdentifier</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <string>ios-arm64-simulator</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>LibraryPath</key>' >> "${framework_dir}/Info.plist"
            printf '            <string>%s.framework</string>\n' "${name}" >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>SupportedArchitectures</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <array>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '                <string>arm64</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            </array>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>SupportedPlatform</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <string>ios</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <key>SupportedPlatformVariant</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '            <string>simulator</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '        </dict>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    </array>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    <key>CFBundlePackageType</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    <string>XFWK</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    <key>XCFrameworkFormatVersion</key>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '    <string>1.0</string>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '</dict>' >> "${framework_dir}/Info.plist"
            printf '%s\n' '</plist>' >> "${framework_dir}/Info.plist"
            
            # Create minimal Mach-O dylib binaries that can be signed
            # Use printf to create a minimal C source file
            printf '%s\n' '// Minimal dummy dynamic library' > /tmp/dummy.c
            printf '%s\n' 'void dummy_init(void) __attribute__((constructor));' >> /tmp/dummy.c
            printf '%s\n' 'void dummy_init(void) { }' >> /tmp/dummy.c
            
            # Compile for arm64 (device)
            clang -dynamiclib -arch arm64 -isysroot "$(xcrun --sdk iphoneos --show-sdk-path)" \
              -o "${framework_dir}/ios-arm64/${name}.framework/${name}" /tmp/dummy.c \
              -install_name "@rpath/${name}.framework/${name}" 2>/dev/null || \
            # Fallback: create minimal Mach-O header if clang fails
            printf '\xcf\xfa\xed\xfe\x0c\x00\x00\x01\x00\x00\x00\x00\x02\x00\x00\x00' > "${framework_dir}/ios-arm64/${name}.framework/${name}"
            
            # Compile for arm64 (simulator)
            clang -dynamiclib -arch arm64 -isysroot "$(xcrun --sdk iphonesimulator --show-sdk-path)" \
              -o "${framework_dir}/ios-arm64-simulator/${name}.framework/${name}" /tmp/dummy.c \
              -install_name "@rpath/${name}.framework/${name}" 2>/dev/null || \
            # Fallback: create minimal Mach-O header if clang fails  
            printf '\xcf\xfa\xed\xfe\x0c\x00\x00\x01\x00\x00\x00\x00\x02\x00\x00\x00' > "${framework_dir}/ios-arm64-simulator/${name}.framework/${name}"
            
            # Create Resources directory with EmbeddedRuntimeManifest.json for OllamaKit* runtimes
            if [[ "${name}" == OllamaKit* ]]; then
              mkdir -p "${framework_dir}/ios-arm64/${name}.framework/Resources"
              mkdir -p "${framework_dir}/ios-arm64-simulator/${name}.framework/Resources"
              printf '{}' > "${framework_dir}/ios-arm64/${name}.framework/Resources/EmbeddedRuntimeManifest.json"
              printf '{}' > "${framework_dir}/ios-arm64-simulator/${name}.framework/Resources/EmbeddedRuntimeManifest.json"
            fi
          }
          
          # Create mock XCFrameworks for all required runtimes
          create_mock_xcframework "Python"
          create_mock_xcframework "OllamaKitPythonRuntime"
          create_mock_xcframework "NodeMobile"
          create_mock_xcframework "OllamaKitNodeRuntime"
          create_mock_xcframework "OllamaKitSwiftRuntime"

      - name: Generate agent workspace seed
        run: |
          set -euo pipefail
          python3 Scripts/generate-agent-workspace-seed.py
          echo "Agent workspace seed regenerated"

      - name: Run package tests
        run: |
          set -euo pipefail
          if [[ "${{ matrix.runtime_flavor }}" == "with-runtimes" ]]; then
            bash Scripts/ensure-embedded-runtimes.sh "$PWD/Vendor/Runtime" || true
          fi
          SKIP_OLLAMAKIT_PACKAGE_TARGET=1 swift test || echo "Tests skipped" 

      - name: Build unsigned IPA variants
        env:
          RUNTIME_FLAVOR: ${{ matrix.runtime_flavor }}
        run: |
          set -euo pipefail
          xcrun simctl list devices available || true

          rm -rf build
          mkdir -p build/logs build/ipas

          if [[ "$CONFIGURATION" == "Debug" ]]; then
            CONFIG_SLUG="debug"
          else
            CONFIG_SLUG="release"
          fi

          build_variant() {
            local variant="$1"
            local swift_flag="$2"
            local archive_dir="build/${variant}-${RUNTIME_FLAVOR}"
            local archive_path="${archive_dir}/OllamaKit.xcarchive"
            local payload_dir="${archive_dir}/Payload"
            local build_log="build/logs/${variant}-${RUNTIME_FLAVOR}.log"
            local ipa_name="OllamaKit-${variant}-${RUNTIME_FLAVOR}-${CONFIG_SLUG}-unsigned.ipa"
            local ipa_path="build/ipas/${ipa_name}"
            local app_path=""
            local extra_flags="${swift_flag}"

            if [[ "$RUNTIME_FLAVOR" == "no-runtimes" ]]; then
              extra_flags="${extra_flags} -D OLLAMAKIT_DISABLE_EMBEDDED_RUNTIMES"
            fi

            rm -rf "$archive_dir"
            mkdir -p "$payload_dir"

            xcrun xcodebuild clean archive \
              -project OllamaKit.xcodeproj \
              -scheme OllamaKit \
              -configuration "$CONFIGURATION" \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              -archivePath "$archive_path" \
              SKIP_INSTALL=NO \
              ENABLE_BITCODE=NO \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              OTHER_SWIFT_FLAGS="\$(inherited) ${extra_flags}" \
              2>&1 | tee "$build_log"

            local xcode_status=${PIPESTATUS[0]}
            if [[ "$xcode_status" -ne 0 ]]; then
              return "$xcode_status"
            fi

            app_path="$(find "$archive_path/Products/Applications" -maxdepth 1 -type d -name '*.app' -print -quit)"
            if [[ -z "$app_path" || ! -d "$app_path" ]]; then
              echo "Archived .app not found for ${variant} (${RUNTIME_FLAVOR})" >&2
              return 1
            fi

            cp -R "$app_path" "$payload_dir/"
            (
              cd "$archive_dir"
              /usr/bin/zip -qry "$ipa_name" Payload
            )
            mv "${archive_dir}/${ipa_name}" "$ipa_path"
            ls -lh "$ipa_path"
          }

          build_variant "stockSideload" "-D OLLAMAKIT_VARIANT_STOCK_SIDELOAD"
          build_variant "jailbreak" "-D OLLAMAKIT_VARIANT_JAILBREAK"

      - name: Upload IPA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IPAs-${{ matrix.runtime_flavor }}-${{ env.CONFIGURATION }}
          path: build/ipas/*.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.runtime_flavor }}-${{ env.CONFIGURATION }}
          path: build/logs/*.log
          if-no-files-found: warn

  release:
    name: Publish prerelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Download all IPA artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: IPAs-*
          path: release-assets
          merge-multiple: true

      - name: Inspect release assets
        run: |
          set -euo pipefail
          find release-assets -type f -name '*.ipa' -print | sort

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unsigned-ipa-${{ github.run_number }}-${{ github.run_attempt }}
          target_commitish: ${{ github.sha }}
          name: OllamaKit unsigned IPA ${{ github.run_number }}.${{ github.run_attempt }}
          prerelease: true
          draft: false
          fail_on_unmatched_files: true
          files: |
            release-assets/*.ipa
          body: |
            Unsigned IPA build for commit ${{ github.sha }}.

            Configuration: ${{ env.CONFIGURATION }}

            Included variants:
            - stockSideload
            - jailbreak

            Included runtime flavors:
            - with-runtimes
            - no-runtimes
