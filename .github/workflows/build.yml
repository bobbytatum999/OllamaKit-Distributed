name: Build Unsigned IPA

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: Build Type
        required: true
        default: release
        type: choice
        options:
          - debug
          - release

concurrency:
  group: build-unsigned-ipa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  
  # Gemma 4 support requires b8641+ (b8783 includes template fixes + audio encoder)
  LLAMA_CPP_TAG: "b8783"
  CONFIGURATION: ${{ (github.event_name == 'workflow_dispatch' && inputs.build_type == 'debug') && 'Debug' || 'Release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.runtime_flavor }})
    runs-on: macos-26
    continue-on-error: ${{ matrix.runtime_flavor == 'no-runtimes' }}
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        runtime_flavor:
          - with-runtimes
          - no-runtimes

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify toolchain and project
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          xcodebuild -showsdks
          xcodebuild -list -project OllamaKit.xcodeproj
          xcodebuild -showdestinations -project OllamaKit.xcodeproj -scheme OllamaKit || true

      - name: Restore llama.cpp cache
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: |
            .deps/llama.cpp
            Vendor/llama.xcframework
          key: ${{ runner.os }}-llama-xcframework-${{ env.LLAMA_CPP_TAG }}

      - name: Build llama.cpp XCFramework
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .deps Vendor
          rm -rf .deps/llama.cpp Vendor/llama.xcframework
          git clone --depth 1 --branch "${LLAMA_CPP_TAG}" https://github.com/ggml-org/llama.cpp.git .deps/llama.cpp
          bash Scripts/build-llama-ios-xcframework.sh \
            "$PWD/.deps/llama.cpp" \
            "$PWD/Vendor/llama.xcframework"

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Restore embedded runtimes cache
        if: matrix.runtime_flavor == 'with-runtimes'
        id: cache-runtimes
        uses: actions/cache@v4
        with:
          path: Vendor/Runtime
          key: ${{ runner.os }}-embedded-runtimes-${{ hashFiles('Scripts/embedded-runtime-sources.json') }}
